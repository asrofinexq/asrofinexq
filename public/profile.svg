<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="50%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="1000" rx="48" fill="url(#bg)"/>
  <path d="M0 0H800V380C560 320 360 420 0 300V0Z" fill="url(#shine)" opacity="0.65"/>

  <!-- Avatar circle -->
  <g filter="url(#softShadow)">
    <circle cx="400" cy="420" r="180" fill="rgba(255,255,255,0.55)"/>
    <circle cx="400" cy="390" r="70" fill="rgba(17,24,39,0.55)"/>
    <path d="M250 610c22-92 92-150 150-150s128 58 150 150" fill="rgba(17,24,39,0.55)"/>
  </g>

  <!-- Minimal label -->
  <g opacity="0.85">
    <rect x="170" y="730" width="460" height="84" rx="42" fill="rgba(255,255,255,0.55)"/>
    <text x="400" y="785" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="28" fill="rgba(17,24,39,0.75)">
      profile.svg
    </text>
  </g>
</svg>
